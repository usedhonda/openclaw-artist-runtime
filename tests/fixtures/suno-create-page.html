<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Suno Create Fixture</title>
  </head>
  <body>
    <main data-testid="create-page">
      <form aria-label="Create a song">
        <label>
          Song title
          <input placeholder="Song Title (Optional)" value="">
        </label>

        <button type="button" aria-label="Add your own lyrics">Custom lyrics</button>
        <label>
          Lyrics
          <textarea data-testid="lyrics-textarea"></textarea>
        </label>

        <section data-testid="create-form-styles-wrapper">
          <label>
            Style textarea
            <textarea placeholder="Describe the sound you want"></textarea>
          </label>
          <label>
            Style input variant
            <input placeholder="Describe the sound you want">
          </label>
        </section>

        <label>
          Exclude styles input
          <input placeholder="Exclude styles">
        </label>
        <label>
          Exclude styles textarea variant
          <textarea placeholder="Exclude styles"></textarea>
        </label>

        <button
          type="button"
          aria-label="Check this to generate an instrumental only song"
          aria-pressed="false"
        >
          Instrumental
        </button>

        <button type="button" aria-label="Create song">Create</button>
      </form>

      <section aria-label="Workspace">
        <div draggable="true">
          <button type="button" aria-label="Play Watapp Groups">
            <img alt="" data-src="https://cdn2.suno.ai/image_large_11111111-1111-4111-8111-111111111111.jpeg" src="https://cdn2.suno.ai/image_11111111-1111-4111-8111-111111111111.jpeg?width=360" />
          </button>
        </div>

        <div draggable="true">
          <button type="button" aria-label="Play Other Title">
            <img alt="" data-src="https://cdn2.suno.ai/image_large_22222222-2222-4222-8222-222222222222.jpeg" src="https://cdn2.suno.ai/image_22222222-2222-4222-8222-222222222222.jpeg?width=360" />
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
